<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM - Cloud Computing & DevOps</title>
<style>
  :root {
    --primary: #1a2a6c;
    --accent: #c0392b;
    --light: #f5f7fa;
    --border: #dee2e6;
    --success: #27ae60;
    --fail: #e74c3c;
    --warn: #f39c12;
    --card: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--light); color: #333; }

  header {
    background: linear-gradient(135deg, var(--primary), #2c3e80);
    color: white; padding: 20px 30px;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 1.4rem; }
  header p { font-size: .85rem; opacity: .8; }

  nav {
    background: white; border-bottom: 2px solid var(--primary);
    display: flex; gap: 4px; padding: 0 20px;
  }
  nav button {
    padding: 12px 20px; border: none; background: none;
    cursor: pointer; font-weight: 600; color: #666;
    border-bottom: 3px solid transparent; transition: all .2s;
  }
  nav button.active { color: var(--primary); border-bottom-color: var(--accent); }
  nav button:hover { color: var(--primary); }

  .page { display: none; padding: 24px; max-width: 900px; margin: 0 auto; }
  .page.active { display: block; }

  /* === SETUP PAGE === */
  .setup-card {
    background: white; border-radius: 12px; padding: 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08); margin-bottom: 20px;
  }
  .setup-card h2 { color: var(--primary); margin-bottom: 18px; font-size: 1.1rem; }
  .sessions-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px;
  }
  .session-item {
    border: 2px solid var(--border); border-radius: 8px; padding: 12px 14px;
    cursor: pointer; transition: all .2s; user-select: none;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .session-item:hover { border-color: var(--primary); background: #f0f3ff; }
  .session-item.selected { border-color: var(--primary); background: #e8ecff; }
  .session-item input[type=checkbox] { margin-top: 2px; accent-color: var(--primary); }
  .session-num { font-weight: 700; color: var(--accent); font-size: .95rem; }
  .session-title { font-size: .82rem; color: #555; margin-top: 2px; }

  .controls-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 16px; }
  .btn {
    padding: 10px 22px; border: none; border-radius: 8px;
    cursor: pointer; font-weight: 600; font-size: .9rem; transition: all .2s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: #253580; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: #a93226; }
  .btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); }
  .btn-outline:hover { background: #f0f3ff; }
  .btn-sm { padding: 6px 14px; font-size: .82rem; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  label.option-label {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 14px; border-radius: 6px; cursor: pointer;
    border: 2px solid var(--border); margin-bottom: 8px; transition: all .2s;
  }
  label.option-label:hover { border-color: var(--primary); background: #f0f3ff; }
  label.option-label input { margin-top: 3px; accent-color: var(--primary); flex-shrink: 0; }

  select {
    padding: 8px 12px; border: 2px solid var(--border); border-radius: 8px;
    font-size: .9rem; color: #333; background: white;
  }

  /* === QUIZ PAGE === */
  #quiz-header {
    background: white; border-radius: 12px; padding: 16px 22px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .progress-bar-wrap { flex: 1; min-width: 160px; }
  .progress-label { font-size: .8rem; color: #666; margin-bottom: 4px; }
  .progress-bar {
    height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: var(--primary); transition: width .4s; }

  #question-card {
    background: white; border-radius: 12px; padding: 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08); animation: fadeIn .3s;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  .q-meta { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
  .badge {
    padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600;
  }
  .badge-seance { background: #e8ecff; color: var(--primary); }
  .badge-type { background: #fff3cd; color: #856404; }
  .badge-multi { background: #d4edda; color: #155724; }

  .q-text { font-size: 1.05rem; font-weight: 600; margin-bottom: 18px; line-height: 1.5; }
  .q-hint { font-size: .8rem; color: #888; margin-bottom: 14px; font-style: italic; }

  .option-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 16px; border-radius: 8px; cursor: pointer;
    border: 2px solid var(--border); margin-bottom: 8px; transition: all .2s;
  }
  .option-item:hover { border-color: var(--primary); background: #f0f3ff; }
  .option-item.selected { border-color: var(--primary); background: #e8ecff; }
  .option-item.correct { border-color: var(--success)!important; background: #d4edda!important; }
  .option-item.incorrect { border-color: var(--fail)!important; background: #fde8e8!important; }
  .option-item.missed { border-color: var(--warn)!important; background: #fef3cd!important; }
  .option-item input { margin-top: 3px; flex-shrink: 0; }
  .option-letter {
    width: 24px; height: 24px; border-radius: 50%; background: #e0e0e0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: .8rem; flex-shrink: 0;
  }
  .option-text { line-height: 1.4; }

  #explanation {
    margin-top: 16px; padding: 14px 16px; border-radius: 8px;
    background: #f0f7ff; border-left: 4px solid var(--primary);
    font-size: .9rem; display: none;
  }
  #explanation.show { display: block; }

  .quiz-nav { margin-top: 20px; display: flex; gap: 12px; justify-content: space-between; }

  /* === RESULTS PAGE === */
  .result-summary {
    background: white; border-radius: 12px; padding: 30px;
    text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,.08); margin-bottom: 24px;
  }
  .score-circle {
    width: 120px; height: 120px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 16px auto; font-weight: 700;
    border: 6px solid var(--primary);
  }
  .score-num { font-size: 2rem; color: var(--primary); }
  .score-total { font-size: .85rem; color: #888; }

  .result-details { margin-top: 20px; }
  .result-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px; border-radius: 8px; margin-bottom: 8px;
    border: 1px solid var(--border);
  }
  .result-row.rr-correct { border-left: 4px solid var(--success); }
  .result-row.rr-wrong { border-left: 4px solid var(--fail); }
  .result-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }
  .result-q { font-weight: 600; font-size: .9rem; }
  .result-ans { font-size: .82rem; color: #666; margin-top: 4px; }

  /* === HISTORY PAGE === */
  .history-item {
    background: white; border-radius: 10px; padding: 18px 22px;
    box-shadow: 0 1px 6px rgba(0,0,0,.07); margin-bottom: 12px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .hist-score { font-size: 1.5rem; font-weight: 700; color: var(--primary); min-width: 60px; }
  .hist-info { flex: 1; }
  .hist-date { font-size: .8rem; color: #888; }
  .hist-sessions { font-size: .85rem; margin-top: 4px; }
  .hist-bar-wrap { width: 120px; }
  .hist-bar { height: 8px; border-radius: 4px; background: #e0e0e0; overflow: hidden; margin-top: 4px; }
  .hist-fill { height: 100%; background: var(--success); }
  .hist-fill.medium { background: var(--warn); }
  .hist-fill.low { background: var(--fail); }
  .empty-state { text-align: center; padding: 60px; color: #aaa; }
  .empty-state svg { margin-bottom: 12px; }

  /* RESPONSIVE */
  @media(max-width:600px) {
    header h1 { font-size: 1.1rem; }
    .sessions-grid { grid-template-columns: 1fr 1fr; }
    #quiz-header { flex-direction: column; }
    .quiz-nav { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>QCM — Le Cloud Computing &amp; DevOps</h1>
    <p>Pr. F. Benabbou · Master DSBD &amp; IA · FSBM Casablanca</p>
  </div>
</header>

<nav>
  <button class="active" onclick="showPage('setup')">Configurer</button>
  <button onclick="showPage('quiz')" id="nav-quiz" disabled>Quiz</button>
  <button onclick="showPage('history')">Historique</button>
</nav>

<!-- ====== SETUP PAGE ====== -->
<div id="page-setup" class="page active">
  <div class="setup-card">
    <h2>Sélectionnez les séances</h2>
    <div class="controls-row" style="margin-bottom:14px">
      <button class="btn btn-outline btn-sm" onclick="selectAll(true)">Tout sélectionner</button>
      <button class="btn btn-outline btn-sm" onclick="selectAll(false)">Tout désélectionner</button>
    </div>
    <div class="sessions-grid" id="sessions-grid"></div>
  </div>

  <div class="setup-card">
    <h2>Options du quiz</h2>
    <div class="controls-row">
      <div>
        <label style="font-size:.88rem;font-weight:600;color:#555;display:block;margin-bottom:6px">Nombre de questions</label>
        <select id="nb-questions">
          <option value="5">5 questions</option>
          <option value="10" selected>10 questions</option>
          <option value="15">15 questions</option>
          <option value="20">20 questions</option>
          <option value="999">Toutes les questions</option>
        </select>
      </div>
      <div>
        <label style="font-size:.88rem;font-weight:600;color:#555;display:block;margin-bottom:6px">Ordre des questions</label>
        <select id="order-questions">
          <option value="random">Aléatoire</option>
          <option value="sequential">Séquentiel</option>
        </select>
      </div>
    </div>
  </div>

  <button class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem" onclick="startQuiz()">
    Démarrer le quiz
  </button>
</div>

<!-- ====== QUIZ PAGE ====== -->
<div id="page-quiz" class="page">
  <div id="quiz-header">
    <div>
      <div style="font-weight:700;color:var(--primary)" id="q-counter">Question 1 / 10</div>
      <div style="font-size:.8rem;color:#888;margin-top:2px" id="q-seance-info"></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-label" id="progress-label">0%</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div style="font-weight:700;color:var(--success)" id="score-display">Score: 0</div>
  </div>

  <div id="question-card">
    <div class="q-meta" id="q-meta"></div>
    <div class="q-text" id="q-text"></div>
    <div class="q-hint" id="q-hint"></div>
    <div id="options-container"></div>
    <div id="explanation"></div>
  </div>

  <div class="quiz-nav">
    <button class="btn btn-outline" onclick="quitQuiz()">Abandonner</button>
    <div style="display:flex;gap:10px">
      <button class="btn btn-accent" id="btn-validate" onclick="validateAnswer()">Valider</button>
      <button class="btn btn-primary" id="btn-next" onclick="nextQuestion()" style="display:none">Suivant →</button>
    </div>
  </div>
</div>

<!-- ====== RESULTS PAGE ====== -->
<div id="page-results" class="page">
  <div class="result-summary">
    <h2 style="color:var(--primary)">Résultats du quiz</h2>
    <div class="score-circle" id="res-circle">
      <span class="score-num" id="res-score">0</span>
      <span class="score-total" id="res-total">/ 0</span>
    </div>
    <div id="res-message" style="font-size:1.1rem;margin-bottom:8px"></div>
    <div id="res-pct" style="font-size:.9rem;color:#888"></div>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="startQuiz()">Recommencer</button>
      <button class="btn btn-outline" onclick="showPage('setup')">Reconfigurer</button>
    </div>
  </div>
  <h3 style="margin-bottom:14px;color:var(--primary)">Détail des réponses</h3>
  <div id="result-details" class="result-details"></div>
</div>

<!-- ====== HISTORY PAGE ====== -->
<div id="page-history" class="page">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px">
    <h2 style="color:var(--primary)">Historique des quiz</h2>
    <button class="btn btn-accent btn-sm" onclick="clearHistory()">Effacer l'historique</button>
  </div>
  <div id="history-list"></div>
</div>

<script>
// =====================================================================
//  DATA: All questions
// =====================================================================
const SESSIONS = [
  { id:1,  title:"Introduction Cloud Computing" },
  { id:2,  title:"La Virtualisation" },
  { id:3,  title:"Virtualisation de Stockage" },
  { id:4,  title:"Virtualisation des Applications" },
  { id:5,  title:"Conteneurs & App Virtuelles" },
  { id:6,  title:"Concepts de base du CC" },
  { id:7,  title:"Technologies Émergentes" },
  { id:8,  title:"Philosophie DevOps & Agile" },
  { id:9,  title:"Développement Continu & Git" },
  { id:10, title:"Intégration Continue CI" },
  { id:11, title:"Déploiement Continu CD" },
  { id:12, title:"Infrastructure as Code (IaC)" }
];

const QUESTIONS = [
  // ===== SÉANCE 1 =====
  {
    seance:1,
    type:"single",
    text:"Quelle entreprise est considérée comme le véritable pionnier du Cloud Computing en 1999 ?",
    options:["Amazon Web Services","Microsoft Azure","Salesforce.com","Google Cloud"],
    correct:[2],
    explanation:"Salesforce.com est considéré comme un pionnier du Cloud Computing en lançant en 1999 le concept de livraison d'applications d'entreprise (CRM) via un site web."
  },
  {
    seance:1,
    type:"single",
    text:"En quelle année Amazon a-t-il proposé Elastic Compute Cloud (EC2) ?",
    options:["1999","2002","2004","2006"],
    correct:[3],
    explanation:"En 2006, Amazon a proposé EC2 (Elastic Compute Cloud), permettant aux petites entreprises et aux particuliers de louer des ordinateurs pour exécuter leurs applications."
  },
  {
    seance:1,
    type:"multi",
    text:"Lesquels de ces services sont des exemples de solutions Cloud utilisées au quotidien ? (plusieurs réponses)",
    options:["Dropbox","Microsoft Word (version bureau)","Gmail","YouTube"],
    correct:[0,2,3],
    explanation:"Dropbox, Gmail et YouTube sont des services Cloud accessibles via Internet. Microsoft Word en version bureau est installé localement, ce n'est pas un service Cloud."
  },
  {
    seance:1,
    type:"single",
    text:"Que propose Amazon Web Services depuis 2002 ?",
    options:["Des logiciels de bureautique","Des services de location de serveurs à la demande","Des smartphones connectés","Des réseaux sociaux"],
    correct:[1],
    explanation:"Depuis 2002, AWS fournit des services de location de serveurs à la demande via Internet."
  },
  {
    seance:1,
    type:"single",
    text:"Le Cloud Computing permet à des entreprises de :",
    options:["Acheter obligatoirement leur propre matériel","Externaliser leur infrastructure informatique via Internet","Supprimer complètement la notion de serveur","Fonctionner sans connexion Internet"],
    correct:[1],
    explanation:"Le Cloud Computing permet d'externaliser l'infrastructure informatique et d'accéder à des ressources via Internet, sans avoir à acheter son propre matériel."
  },
  {
    seance:1,
    type:"multi",
    text:"Parmi les propositions suivantes, lesquelles sont des fournisseurs majeurs du Cloud Public ? (plusieurs réponses)",
    options:["Amazon Web Services (AWS)","Microsoft Azure","Google Cloud","Mozilla Firefox"],
    correct:[0,1,2],
    explanation:"AWS, Microsoft Azure et Google Cloud sont les trois grands fournisseurs de Cloud Public. Mozilla Firefox est un navigateur web, pas un fournisseur Cloud."
  },
  {
    seance:1,
    type:"single",
    text:"En 2007, quelle entreprise a lancé la plate-forme Force.com destinée aux développeurs ?",
    options:["Google","Amazon","Microsoft","Salesforce.com"],
    correct:[3],
    explanation:"En 2007, Salesforce.com a lancé Force.com, une plate-forme Cloud de développement (PaaS) destinée aux développeurs."
  },
  {
    seance:1,
    type:"multi",
    text:"En 2009, lesquelles de ces offres sont apparues comme des applications d'entreprise Cloud basées sur le web ? (plusieurs réponses)",
    options:["Google Apps (Logiciel comme service)","Microsoft Azure (Plateforme comme service)","Ubuntu Enterprise Cloud (Infrastructure comme service)","Apache HTTP Server"],
    correct:[0,1,2],
    explanation:"En 2009, Google Apps, Microsoft Azure, IBM Smart Business Service, Sun Cloud et Ubuntu Enterprise Cloud de Canonical ont tous émergé comme solutions Cloud d'entreprise. Apache HTTP Server est un serveur web local, pas un service Cloud."
  },
  {
    seance:1,
    type:"single",
    text:"Quelle suite bureautique Microsoft a été lancée en 2010 comme service Cloud ?",
    options:["Microsoft Windows","Office 365","Microsoft Teams","Microsoft Access"],
    correct:[1],
    explanation:"En 2010, Microsoft a lancé Office 365, sa suite bureautique en tant que service Cloud, permettant l'accès aux applications Office via Internet."
  },
  {
    seance:1,
    type:"single",
    text:"Quelle entreprise a lancé IBM Smart Cloud en 2011 ?",
    options:["Google","Oracle","IBM","Salesforce"],
    correct:[2],
    explanation:"En 2011, IBM a lancé IBM Smart Cloud, un ensemble de technologies et de services visant à aider les entreprises à adopter et à intégrer des environnements cloud."
  },
  {
    seance:1,
    type:"single",
    text:"Selon la définition du NIST, le Cloud Computing permet l'accès à un ensemble partagé de ressources informatiques via quel moyen ?",
    options:["Un réseau local privé uniquement","Un réseau de télécommunications (Internet)","Une connexion directe entre machines","Un support physique (clé USB, CD)"],
    correct:[1],
    explanation:"Selon le NIST, le Cloud Computing est un modèle permettant l'accès aisé, à la demande et au travers d'un réseau de télécommunications, à un ensemble partagé de ressources informatiques pouvant être rapidement mises en service."
  },
  {
    seance:1,
    type:"single",
    text:"Qui a prononcé en 1960 la phrase « Computation may someday be organized as public utility » (prédisant le Cloud) ?",
    options:["Bill Gates","John McCarthy","Linus Torvalds","Tim Berners-Lee"],
    correct:[1],
    explanation:"En 1960, John McCarthy (informaticien et pionnier de l'IA) a annoncé que le calcul informatique pourrait un jour être organisé comme un service public, préfigurant ainsi le concept de Cloud Computing."
  },
  {
    seance:1,
    type:"single",
    text:"Le Grid Computing (Calcul Grille) est apparu dans le domaine académique et de la recherche à quel moment ?",
    options:["Dans les années 1960","Dans les années 1970","Au milieu des années 1990","Dans les années 2010"],
    correct:[2],
    explanation:"Le Grid Computing a été formellement introduit et défini dans le domaine académique et de la recherche au milieu des années 1990, pour permettre l'accès à une puissance de calcul distribuée."
  },
  {
    seance:1,
    type:"multi",
    text:"Parmi ces affirmations, lesquelles sont correctes concernant l'originalité du Cloud Computing ? (plusieurs réponses)",
    options:["Le concept de ressources distantes existait déjà dans les années 1960","Le Cloud représente un nouveau modèle de consommation des services","Les technologies de virtualisation modernes ont permis l'essor du Cloud","Le Cloud Computing est entièrement nouveau et n'a aucune origine antérieure"],
    correct:[0,1,2],
    explanation:"Le Cloud s'appuie sur des concepts anciens (calcul distribué, ressources distantes depuis les années 1960) mais représente bien une innovation : nouveau modèle de consommation, basé sur la virtualisation moderne et l'élasticité pour offrir des services dématérialisés à la demande."
  },
  {
    seance:1,
    type:"multi",
    text:"Quels sont les quatre domaines technologiques dont la convergence a produit le Cloud Computing ? (plusieurs réponses)",
    options:["L'informatique utilitaire","Le Grid Computing","La virtualisation","L'architecture Orientée Service (SOA)"],
    correct:[0,1,2,3],
    explanation:"Le Cloud Computing est le produit de la convergence de quatre domaines : l'informatique utilitaire, le Grid Computing, la virtualisation et l'architecture Orientée Service (SOA)."
  },
  {
    seance:1,
    type:"single",
    text:"Dans l'informatique utilitaire, quel modèle de facturation caractérise les services Cloud ?",
    options:["Abonnement annuel fixe","Paiement à la consommation (pay-per-use)","Achat définitif de licence","Gratuité totale"],
    correct:[1],
    explanation:"L'informatique utilitaire introduit le concept de services vendus avec un modèle de paiement à la consommation (pay-per-use), où l'on paie uniquement ce que l'on utilise, comme pour l'électricité."
  },
  {
    seance:1,
    type:"single",
    text:"Qu'est-ce que l'Architecture Orientée Service (SOA) ?",
    options:["Un système d'exploitation pour serveurs Cloud","Une méthode de développement logiciel qui conçoit une application comme un ensemble de services réutilisables et faiblement couplés","Un protocole réseau pour la communication Cloud","Un type d'hyperviseur pour la virtualisation"],
    correct:[1],
    explanation:"L'Architecture Orientée Services (SOA) est une méthode de développement logiciel qui conçoit une application comme un ensemble de services réutilisables, faiblement couplés et interconnectés, permettant d'augmenter la flexibilité et de réduire les coûts d'intégration."
  },
  {
    seance:1,
    type:"single",
    text:"Quelle est la principale différence entre le Grid Computing et le Cloud Computing ?",
    options:["Le Grid est axé sur le calcul haute performance (HPC) et la recherche, le Cloud sur des services à la demande accessibles à tous","Le Grid est plus récent que le Cloud","Le Cloud ne peut pas faire de calcul distribué","Le Grid utilise Internet alors que le Cloud utilise un réseau local"],
    correct:[0],
    explanation:"Le Grid Computing était principalement axé sur le calcul haute performance (HPC) pour la recherche, avec des protocoles spécifiques et une intégration lourde. Le Cloud Computing se base sur l'abstraction des ressources, l'élasticité et l'accessibilité à la demande pour tous."
  },
  {
    seance:1,
    type:"single",
    text:"Quel est le rôle de la virtualisation dans le Cloud Computing ?",

// =====================================================================
//  STATE
// =====================================================================
let selectedSessions = new Set(SESSIONS.map(s => s.id));
let quizQuestions = [];
let currentIdx = 0;
let score = 0;
let answered = false;
let results = [];

// =====================================================================
//  INIT
// =====================================================================
document.addEventListener('DOMContentLoaded', () => {
  buildSessionsGrid();
  renderHistory();
});

function buildSessionsGrid() {
  const grid = document.getElementById('sessions-grid');
  grid.innerHTML = '';
  SESSIONS.forEach(s => {
    const count = QUESTIONS.filter(q => q.seance === s.id).length;
    const div = document.createElement('div');
    div.className = 'session-item' + (selectedSessions.has(s.id) ? ' selected' : '');
    div.innerHTML = `
      <input type="checkbox" id="s${s.id}" ${selectedSessions.has(s.id) ? 'checked' : ''} onchange="toggleSession(${s.id})">
      <div>
        <div class="session-num">Séance ${s.id}</div>
        <div class="session-title">${s.title}</div>
        <div style="font-size:.75rem;color:#aaa;margin-top:2px">${count} questions</div>
      </div>`;
    div.onclick = (e) => { if(e.target.tagName !== 'INPUT') toggleSession(s.id); };
    grid.appendChild(div);
  });
}

function toggleSession(id) {
  if(selectedSessions.has(id)) selectedSessions.delete(id);
  else selectedSessions.add(id);
  buildSessionsGrid();
}

function selectAll(val) {
  if(val) SESSIONS.forEach(s => selectedSessions.add(s.id));
  else selectedSessions.clear();
  buildSessionsGrid();
}

// =====================================================================
//  NAVIGATION
// =====================================================================
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const idx = ['setup','quiz','history'].indexOf(name);
  document.querySelectorAll('nav button')[idx]?.classList.add('active');
  if(name === 'history') renderHistory();
}

// =====================================================================
//  QUIZ LOGIC
// =====================================================================
function startQuiz() {
  if(selectedSessions.size === 0) { alert('Veuillez sélectionner au moins une séance.'); return; }
  const pool = QUESTIONS.filter(q => selectedSessions.has(q.seance));
  if(pool.length === 0) { alert('Aucune question disponible pour les séances sélectionnées.'); return; }

  const nbQ = parseInt(document.getElementById('nb-questions').value);
  const order = document.getElementById('order-questions').value;

  let shuffled = order === 'random' ? shuffle([...pool]) : [...pool].sort((a,b) => a.seance - b.seance);
  quizQuestions = shuffled.slice(0, Math.min(nbQ, shuffled.length));

  currentIdx = 0; score = 0; results = []; answered = false;

  document.getElementById('nav-quiz').disabled = false;
  showPage('quiz');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = quizQuestions[currentIdx];
  const total = quizQuestions.length;
  const pct = Math.round((currentIdx / total) * 100);

  document.getElementById('q-counter').textContent = `Question ${currentIdx + 1} / ${total}`;
  const sName = SESSIONS.find(s => s.id === q.seance)?.title || '';
  document.getElementById('q-seance-info').textContent = `Séance ${q.seance} — ${sName}`;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = pct + '%';
  document.getElementById('score-display').textContent = `Score: ${score}`;

  document.getElementById('q-meta').innerHTML = `
    <span class="badge badge-seance">Séance ${q.seance}</span>
    <span class="badge ${q.type === 'multi' ? 'badge-multi' : 'badge-type'}">${q.type === 'multi' ? 'Choix multiples' : 'Choix unique'}</span>`;

  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-hint').textContent = q.type === 'multi' ? '(Plusieurs réponses possibles — cochez toutes les bonnes réponses)' : '(Une seule bonne réponse)';

  const container = document.getElementById('options-container');
  const letters = ['A','B','C','D','E','F'];
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const item = document.createElement('div');
    item.className = 'option-item';
    item.id = `opt-${i}`;
    item.innerHTML = `
      <input type="${q.type === 'multi' ? 'checkbox' : 'radio'}" name="opt" id="input-${i}" value="${i}" onchange="onSelect(${i})">
      <div class="option-letter">${letters[i]}</div>
      <div class="option-text">${opt}</div>`;
    item.onclick = (e) => { if(e.target.tagName !== 'INPUT') { document.getElementById(`input-${i}`).click(); } };
    container.appendChild(item);
  });

  document.getElementById('explanation').className = '';
  document.getElementById('explanation').textContent = '';
  document.getElementById('btn-validate').style.display = 'inline-block';
  document.getElementById('btn-next').style.display = 'none';
}

function onSelect(i) {
  const q = quizQuestions[currentIdx];
  if(q.type === 'single') {
    document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
  }
  const item = document.getElementById(`opt-${i}`);
  const input = document.getElementById(`input-${i}`);
  if(q.type === 'multi') {
    item.classList.toggle('selected', input.checked);
  } else {
    item.classList.add('selected');
  }
}

function getSelected() {
  const inputs = document.querySelectorAll('#options-container input:checked');
  return Array.from(inputs).map(i => parseInt(i.value));
}

function validateAnswer() {
  if(answered) return;
  const q = quizQuestions[currentIdx];
  const selected = getSelected();
  if(selected.length === 0) { alert('Veuillez sélectionner au moins une réponse.'); return; }

  answered = true;
  const correct = q.correct.slice().sort();
  const sel = selected.slice().sort();
  const isCorrect = JSON.stringify(correct) === JSON.stringify(sel);
  if(isCorrect) score++;

  // Color options
  q.options.forEach((_, i) => {
    const item = document.getElementById(`opt-${i}`);
    const isSelectedByUser = selected.includes(i);
    const isCorrectAnswer = q.correct.includes(i);

    if(isCorrectAnswer && isSelectedByUser) item.classList.add('correct');
    else if(!isCorrectAnswer && isSelectedByUser) item.classList.add('incorrect');
    else if(isCorrectAnswer && !isSelectedByUser) item.classList.add('missed');
    item.classList.remove('selected');
  });

  document.getElementById('explanation').textContent = '💡 ' + q.explanation;
  document.getElementById('explanation').className = 'show';

  results.push({ q, selected, correct: q.correct, isCorrect });

  document.getElementById('btn-validate').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-block';
  document.getElementById('btn-next').textContent = currentIdx + 1 < quizQuestions.length ? 'Suivant →' : 'Voir les résultats';
  document.getElementById('score-display').textContent = `Score: ${score}`;
}

function nextQuestion() {
  currentIdx++;
  if(currentIdx < quizQuestions.length) {
    document.getElementById('question-card').style.animation = 'none';
    requestAnimationFrame(() => {
      document.getElementById('question-card').style.animation = '';
      renderQuestion();
    });
  } else {
    showResults();
  }
}

function quitQuiz() {
  if(confirm('Abandonner le quiz ? La progression sera perdue.')) {
    showPage('setup');
  }
}

// =====================================================================
//  RESULTS
// =====================================================================
function showResults() {
  const total = quizQuestions.length;
  const pct = Math.round((score / total) * 100);
  const circle = document.getElementById('res-circle');
  circle.style.borderColor = pct >= 70 ? 'var(--success)' : pct >= 50 ? 'var(--warn)' : 'var(--fail)';
  document.getElementById('res-score').textContent = score;
  document.getElementById('res-total').textContent = '/ ' + total;
  document.getElementById('res-pct').textContent = pct + '% de bonnes réponses';

  let msg = pct >= 80 ? '🎉 Excellent ! Très bonne maîtrise du cours !' :
            pct >= 60 ? '👍 Bien ! Continuez vos révisions.' :
            pct >= 40 ? '📚 Des lacunes à combler, révisez les séances concernées.' :
            '⚠️ Des révisions importantes sont nécessaires.';
  document.getElementById('res-message').textContent = msg;

  const details = document.getElementById('result-details');
  details.innerHTML = '';
  results.forEach((r, i) => {
    const sName = SESSIONS.find(s => s.id === r.q.seance)?.title || '';
    const letters = ['A','B','C','D','E','F'];
    const correctLabels = r.correct.map(i => letters[i] + '. ' + r.q.options[i]).join(', ');
    const selectedLabels = r.selected.map(i => letters[i] + '. ' + r.q.options[i]).join(', ');
    details.innerHTML += `
      <div class="result-row ${r.isCorrect ? 'rr-correct' : 'rr-wrong'}">
        <div class="result-icon">${r.isCorrect ? '✅' : '❌'}</div>
        <div>
          <div class="result-q">Q${i+1}. <span style="font-size:.8rem;color:#888">[Séance ${r.q.seance} – ${sName}]</span></div>
          <div class="result-q" style="margin-top:4px">${r.q.text}</div>
          <div class="result-ans" style="margin-top:6px">
            ${!r.isCorrect ? `<span style="color:var(--fail)">Votre réponse : ${selectedLabels}</span><br>` : ''}
            <span style="color:var(--success)">Bonne réponse : ${correctLabels}</span>
          </div>
        </div>
      </div>`;
  });

  // Save to history
  const sessions = [...new Set(quizQuestions.map(q => q.seance))].sort();
  saveHistory({ score, total, pct, sessions, date: new Date().toISOString() });

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-results').classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
}

// =====================================================================
//  HISTORY
// =====================================================================
function saveHistory(entry) {
  const h = JSON.parse(localStorage.getItem('qcm_history') || '[]');
  h.unshift(entry);
  if(h.length > 50) h.pop();
  localStorage.setItem('qcm_history', JSON.stringify(h));
}

function renderHistory() {
  const h = JSON.parse(localStorage.getItem('qcm_history') || '[]');
  const list = document.getElementById('history-list');
  if(!list) return;
  if(h.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div>Aucun quiz passé pour l'instant.</div></div>`;
    return;
  }
  list.innerHTML = h.map((entry, i) => {
    const date = new Date(entry.date);
    const dateStr = date.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    const fillClass = entry.pct >= 70 ? '' : entry.pct >= 50 ? 'medium' : 'low';
    const sessions = (entry.sessions || []).map(s => `S${s}`).join(', ');
    return `<div class="history-item">
      <div class="hist-score">${entry.score}/${entry.total}</div>
      <div class="hist-info">
        <div style="font-weight:600">${entry.pct}% — ${getMention(entry.pct)}</div>
        <div class="hist-date">${dateStr}</div>
        <div class="hist-sessions">Séances : ${sessions || 'N/A'}</div>
      </div>
      <div class="hist-bar-wrap">
        <div style="font-size:.75rem;text-align:right;color:#888">${entry.pct}%</div>
        <div class="hist-bar"><div class="hist-fill ${fillClass}" style="width:${entry.pct}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

function getMention(pct) {
  if(pct >= 80) return '🏆 Excellent';
  if(pct >= 60) return '👍 Bien';
  if(pct >= 40) return '📚 À améliorer';
  return '⚠️ Insuffisant';
}

function clearHistory() {
  if(confirm('Effacer tout l\'historique ?')) {
    localStorage.removeItem('qcm_history');
    renderHistory();
  }
}

// =====================================================================
//  UTILS
// =====================================================================
function shuffle(arr) {
  for(let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
</script>
