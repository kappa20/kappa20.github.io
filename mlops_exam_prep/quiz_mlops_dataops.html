<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz MLOps &amp; DataOps — Pr. AIT DAOUD</title>
<style>
:root {
  --primary: #1565c0;
  --primary-dark: #0d47a1;
  --secondary: #00acc1;
  --accent: #f57c00;
  --success: #2e7d32;
  --error: #c62828;
  --bg: #f0f4f8;
  --card: #ffffff;
  --text: #1a2332;
  --muted: #5c6b7a;
  --border: #dde3ea;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header {
  background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--secondary) 100%);
  color: #fff; padding: 28px 24px; text-align: center;
}
.header h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.3px; }
.header p { margin-top: 6px; opacity: .85; font-size: .95rem; }

.container { max-width: 780px; margin: 0 auto; padding: 32px 16px 64px; }

/* ── Start screen ── */
.screen { display: none; }
.screen.active { display: block; }

.card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 32px;
  margin-bottom: 20px;
}

.chapter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 14px; margin: 20px 0; }
.ch-btn {
  border: 2px solid var(--border); border-radius: 10px; padding: 16px;
  background: var(--card); cursor: pointer; text-align: left; transition: all .2s;
  font-family: inherit;
}
.ch-btn.active-ch1 { border-color: var(--primary); background: rgba(21,101,192,.07); }
.ch-btn.active-ch2 { border-color: var(--secondary); background: rgba(0,172,193,.07); }
.ch-btn.active-ch3 { border-color: var(--accent); background: rgba(245,124,0,.07); }
.ch-btn.active-ch4 { border-color: #7b1fa2; background: rgba(123,31,162,.07); }
.ch-btn .ch-title { font-weight: 600; font-size: .95rem; margin-bottom: 4px; }
.ch-btn .ch-count { font-size: .8rem; color: var(--muted); }

.options-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin: 16px 0; }
.toggle-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: .9rem; }
.toggle-label input { width: 16px; height: 16px; cursor: pointer; }

.btn {
  display: inline-block; padding: 12px 28px; border-radius: 8px;
  font-size: 1rem; font-weight: 600; cursor: pointer; border: none;
  transition: transform .1s, box-shadow .1s; font-family: inherit;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 3px 10px rgba(21,101,192,.3); }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
.btn-secondary:hover { background: rgba(21,101,192,.06); }

/* ── Quiz screen ── */
.progress-wrap { margin-bottom: 20px; }
.progress-meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-bottom: 6px; }
.progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 3px; transition: width .4s ease; }

.q-header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.tag { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 3px 9px; border-radius: 20px; }
.tag-ch1 { background: rgba(21,101,192,.12); color: var(--primary); }
.tag-ch2 { background: rgba(0,172,193,.12); color: #00838f; }
.tag-ch3 { background: rgba(245,124,0,.12); color: #e65100; }
.tag-ch4 { background: rgba(123,31,162,.12); color: #7b1fa2; }
.q-num { font-size: .82rem; color: var(--muted); }

.q-text { font-size: 1.08rem; font-weight: 600; line-height: 1.5; margin-bottom: 22px; }

.choices { display: flex; flex-direction: column; gap: 10px; }
.choice-btn {
  display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px;
  border: 2px solid var(--border); border-radius: 10px; background: var(--card);
  cursor: pointer; text-align: left; transition: border-color .15s, background .15s;
  font-family: inherit; font-size: .95rem; line-height: 1.45;
}
.choice-btn:hover:not(:disabled) { border-color: var(--primary); background: rgba(21,101,192,.04); }
.choice-btn .letter {
  width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: .78rem; font-weight: 700; flex-shrink: 0;
  background: rgba(21,101,192,.1); color: var(--primary); margin-top: 1px;
}
.choice-btn.correct { border-color: var(--success); background: rgba(46,125,50,.08); }
.choice-btn.correct .letter { background: var(--success); color: #fff; }
.choice-btn.wrong { border-color: var(--error); background: rgba(198,40,40,.08); }
.choice-btn.wrong .letter { background: var(--error); color: #fff; }
.choice-btn:disabled { cursor: default; }

.feedback-box {
  margin-top: 16px; padding: 14px 16px; border-radius: 10px;
  border-left: 4px solid var(--success); background: rgba(46,125,50,.07);
  font-size: .9rem; line-height: 1.55; display: none;
}
.feedback-box.wrong-fb { border-color: var(--error); background: rgba(198,40,40,.07); }

.nav-row { display: flex; justify-content: flex-end; margin-top: 20px; }

/* ── Results screen ── */
.result-top { text-align: center; padding: 12px 0 28px; }
.score-circle {
  width: 130px; height: 130px; border-radius: 50%;
  background: conic-gradient(var(--primary) var(--pct, 0%), #e0e0e0 0%);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 18px; position: relative;
}
.score-inner {
  width: 102px; height: 102px; border-radius: 50%; background: var(--card);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.score-pct { font-size: 1.9rem; font-weight: 800; color: var(--primary); line-height: 1; }
.score-label { font-size: .75rem; color: var(--muted); margin-top: 3px; }
.result-msg { font-size: 1.15rem; font-weight: 600; margin-bottom: 6px; }
.result-sub { font-size: .9rem; color: var(--muted); }

.chapter-breakdown { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px,1fr)); gap: 14px; margin-top: 22px; }
.ch-score-card { padding: 18px; border-radius: 10px; border: 2px solid var(--border); }
.ch-score-card h4 { font-size: .85rem; font-weight: 700; margin-bottom: 8px; }
.ch-score-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
.ch-score-fill { height: 100%; border-radius: 3px; }
.ch-score-num { font-size: .8rem; color: var(--muted); }
.ch1-fill { background: var(--primary); }
.ch2-fill { background: var(--secondary); }
.ch3-fill { background: var(--accent); }
.ch4-fill { background: #7b1fa2; }

.result-actions { display: flex; gap: 12px; justify-content: center; margin-top: 28px; flex-wrap: wrap; }

h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
.subtitle { font-size: .9rem; color: var(--muted); margin-bottom: 20px; }

/* ── History screen ── */
.hist-list { display: flex; flex-direction: column; gap: 12px; }
.hist-item { border: 2px solid var(--border); border-radius: 10px; overflow: hidden; }
.hist-header {
  display: flex; align-items: center; gap: 14px; padding: 16px;
  cursor: pointer; background: var(--card); user-select: none;
}
.hist-header:hover { background: #f7f9fc; }
.hist-score-mini {
  width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.hist-score-inner {
  width: 38px; height: 38px; border-radius: 50%; background: var(--card);
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 800;
}
.hist-info { flex: 1; min-width: 0; }
.hist-date { font-size: .75rem; color: var(--muted); }
.hist-score-line { font-weight: 700; font-size: .98rem; margin-top: 2px; }
.hist-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
.hist-chevron { font-size: .9rem; color: var(--muted); transition: transform .2s; flex-shrink: 0; }
.hist-chevron.open { transform: rotate(180deg); }
.hist-detail { display: none; border-top: 1px solid var(--border); background: #fafbfc; }
.hist-detail.open { display: block; }
.hist-q { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.hist-q:last-child { border-bottom: none; }
.hist-q-label { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.hist-q-text { font-size: .9rem; font-weight: 600; line-height: 1.4; margin-bottom: 10px; color: var(--text); }
.hist-choice {
  font-size: .84rem; padding: 6px 10px; border-radius: 6px;
  margin-bottom: 4px; display: flex; align-items: flex-start; gap: 6px;
}
.hist-choice .hc-letter { font-weight: 700; flex-shrink: 0; width: 18px; }
.hist-choice.correct-ans { background: rgba(46,125,50,.1); color: #2e7d32; }
.hist-choice.wrong-ans { background: rgba(198,40,40,.1); color: #c62828; }
.hist-choice.neutral { color: var(--muted); }
.hist-expl { font-size: .8rem; color: var(--muted); margin-top: 8px; font-style: italic; line-height: 1.5; }
.empty-history { text-align: center; padding: 52px 24px; color: var(--muted); }
.empty-history .empty-icon { font-size: 2.8rem; margin-bottom: 14px; }
.hist-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
.btn-danger { background: transparent; border: 2px solid var(--error); color: var(--error); font-size: .85rem; padding: 8px 16px; }
.btn-danger:hover { background: rgba(198,40,40,.06); }

@media (max-width: 520px) {
  .card { padding: 20px 16px; }
  .header h1 { font-size: 1.35rem; }
  .chapter-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Quiz MLOps &amp; DataOps</h1>
  <p>Pr. Mohammed AIT DAOUD — FSBM, Université Hassan II — 2025/2026</p>
</div>

<div class="container">

  <!-- START SCREEN -->
  <div id="start-screen" class="screen active">
    <div class="card">
      <h2>Choisir les chapitres</h2>
      <p class="subtitle">Sélectionnez un ou plusieurs chapitres pour générer votre quiz.</p>
      <div class="chapter-grid">
        <button class="ch-btn active-ch1" onclick="toggleChapter(1,this)">
          <div class="ch-title">Chapitre 1</div>
          <div style="font-size:.82rem;color:var(--primary);font-weight:600;margin-bottom:4px;">Fondamentaux DataOps &amp; MLOps</div>
          <div class="ch-count">28 questions</div>
        </button>
        <button class="ch-btn active-ch2" onclick="toggleChapter(2,this)">
          <div class="ch-title">Chapitre 2</div>
          <div style="font-size:.82rem;color:#00838f;font-weight:600;margin-bottom:4px;">Pipelines Agiles &amp; Orchestration</div>
          <div class="ch-count">27 questions</div>
        </button>
        <button class="ch-btn active-ch3" onclick="toggleChapter(3,this)">
          <div class="ch-title">Chapitre 3</div>
          <div style="font-size:.82rem;color:#e65100;font-weight:600;margin-bottom:4px;">Qualité &amp; Tests de Données</div>
          <div class="ch-count">25 questions</div>
        </button>
        <button class="ch-btn active-ch4" onclick="toggleChapter(4,this)">
          <div class="ch-title">Certification</div>
          <div style="font-size:.82rem;color:#7b1fa2;font-weight:600;margin-bottom:4px;">DataKitchen — DataOps Fundamentals</div>
          <div class="ch-count">28 questions</div>
        </button>
      </div>
      <div class="options-row">
        <label class="toggle-label">
          <input type="checkbox" id="shuffle-q" checked> Mélanger les questions
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="shuffle-c" checked> Mélanger les réponses
        </label>
      </div>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="startQuiz()">Commencer le quiz ▶</button>
        <button class="btn btn-secondary" onclick="showHistory()" style="font-size:.9rem;">Historique</button>
      </div>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen" class="screen">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="prog-text">Question 1 / 50</span>
        <span id="score-text">Score : 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="card">
      <div class="q-header">
        <span class="tag" id="q-tag">CH1</span>
        <span class="q-num" id="q-num">Q1</span>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback-box" id="feedback"></div>
      <div class="nav-row">
        <button class="btn btn-primary" id="next-btn" style="display:none" onclick="nextQuestion()">Question suivante →</button>
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="screen">
    <div class="card">
      <div class="result-top">
        <div class="score-circle" id="score-circle">
          <div class="score-inner">
            <div class="score-pct" id="score-pct">0%</div>
            <div class="score-label" id="score-fraction">0/0</div>
          </div>
        </div>
        <div class="result-msg" id="result-msg"></div>
        <div class="result-sub" id="result-sub"></div>
      </div>
      <div class="chapter-breakdown" id="ch-breakdown"></div>
      <div class="result-actions">
        <button class="btn btn-primary" onclick="retryQuiz()">Recommencer</button>
        <button class="btn btn-secondary" onclick="backToStart()">Changer chapitres</button>
        <button class="btn btn-secondary" onclick="showHistory()">Voir l'historique</button>
      </div>
    </div>
  </div>

  <!-- HISTORY SCREEN -->
  <div id="history-screen" class="screen">
    <div class="card">
      <div class="hist-toolbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="btn btn-secondary" onclick="backToStart()" style="padding:8px 18px;font-size:.88rem;">← Retour</button>
          <h2 style="margin:0;">Historique des quiz</h2>
        </div>
        <button class="btn btn-danger" onclick="clearHistory()">Effacer tout</button>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

</div>

<script>
const ALL_QUESTIONS = [
  // ═══════════════════════════════════════════════════
  // CHAPITRE 1 — Fondamentaux DataOps & MLOps (18 q)
  // ═══════════════════════════════════════════════════
  {
    ch: 1,
    q: "Selon Jabbari (2016), DevOps est défini comme :",
    choices: [
      "Un ensemble d'outils d'intégration continue et de déploiement automatisé",
      "Une combinaison de philosophies culturelles, pratiques et outils visant à améliorer la collaboration entre développement et opérations",
      "Une méthodologie Agile adaptée aux équipes de données",
      "Un framework de gestion de la qualité des données en production"
    ],
    correct: 1,
    explanation: "Jabbari (2016) définit DevOps comme une combinaison de philosophies culturelles, pratiques et outils permettant d'améliorer la vitesse de livraison et la qualité grâce à la collaboration entre Dev et Ops."
  },
  {
    ch: 1,
    q: "Le DataOps Manifesto a été publié par :",
    choices: [
      "Atwal (2019)",
      "Gift & Deza (2021)",
      "Bergh (2017)",
      "Gartner (2017)"
    ],
    correct: 2,
    explanation: "Le DataOps Manifesto a été publié par Bergh en 2017. Il définit le DataOps comme la combinaison du développement Agile, DevOps et Lean Manufacturing appliqués à la donnée."
  },
  {
    ch: 1,
    q: "Selon Atwal (2019), le DataOps repose sur l'alignement de :",
    choices: [
      "Code, modèles et infrastructure",
      "Personnes, processus et technologie",
      "Données, pipelines et orchestrateurs",
      "Développeurs, data scientists et DevOps engineers"
    ],
    correct: 1,
    explanation: "Atwal (2019) définit le DataOps comme l'alignement des personnes, des processus et de la technologie pour améliorer la qualité, la vitesse et la collaboration autour de la donnée."
  },
  {
    ch: 1,
    q: "Gift & Deza (2021) définissent MLOps comme :",
    choices: [
      "L'automatisation du réentraînement des modèles ML en production",
      "Le processus de prendre un modèle ML d'un laptop à un environnement de production",
      "La combinaison de DataOps et DevOps appliquée aux pipelines ML",
      "Un cadre de gouvernance pour les modèles d'intelligence artificielle"
    ],
    correct: 1,
    explanation: "Gift & Deza (2021) définissent MLOps comme le processus de prendre un modèle ML d'un laptop à un environnement de production, couvrant tout le cycle de vie du modèle."
  },
  {
    ch: 1,
    q: "Dans le tableau comparatif DevOps / DataOps / MLOps, l'objet principal du DataOps est :",
    choices: [
      "Applications logicielles",
      "Modèles ML",
      "Pipelines de données",
      "Infrastructure cloud"
    ],
    correct: 2,
    explanation: "Le DataOps porte sur les pipelines de données (ETL, ELT, flux de données). DevOps porte sur les applications logicielles, et MLOps sur les modèles ML."
  },
  {
    ch: 1,
    q: "Le risque clé associé au DataOps est :",
    choices: [
      "Surapprentissage du modèle",
      "Drift de données",
      "Déploiement continu défaillant",
      "Latence réseau excessive"
    ],
    correct: 1,
    explanation: "Le risque clé du DataOps est le drift de données (changement de distribution des données en production), qui peut dégrader silencieusement la qualité des pipelines et des modèles."
  },
  {
    ch: 1,
    q: "La fondation de la hiérarchie des besoins MLOps (pyramide) est :",
    choices: [
      "Monitoring et observabilité",
      "Gouvernance et conformité",
      "Base DevOps : versionnement, CI/CD, tests",
      "Automatisation du réentraînement"
    ],
    correct: 2,
    explanation: "La base de la pyramide MLOps est la Base DevOps (versionnement du code, CI/CD, tests). Sans ces fondations solides, les couches supérieures (data engineering, ML platform, monitoring) ne peuvent pas tenir."
  },
  {
    ch: 1,
    q: "La reproductibilité dans le contexte MLOps signifie :",
    choices: [
      "Pouvoir réexécuter une expérience dans les mêmes conditions et obtenir un résultat cohérent",
      "Suivre automatiquement les performances d'un modèle en production",
      "Déployer le même modèle sur différents environnements cloud",
      "Documenter toutes les étapes de développement d'un pipeline"
    ],
    correct: 0,
    explanation: "La reproductibilité garantit que l'on peut réexécuter une expérience (entraînement, pipeline) dans les mêmes conditions et obtenir un résultat cohérent. Elle est fondamentale pour la confiance scientifique et opérationnelle."
  },
  {
    ch: 1,
    q: "La traçabilité répond à la question :",
    choices: [
      "Comment améliorer les performances du modèle ?",
      "Quand faut-il réentraîner le modèle ?",
      "D'où vient ce résultat ?",
      "Qui a accès à ces données ?"
    ],
    correct: 2,
    explanation: "La traçabilité répond à la question : « D'où vient ce résultat ? » Elle permet de remonter jusqu'aux données sources, aux transformations et au code ayant produit un artefact donné."
  },
  {
    ch: 1,
    q: "Selon Gartner (2017), AIOps désigne :",
    choices: [
      "L'application de l'IA aux opérations IT pour détecter anomalies et automatiser les réponses",
      "Les pratiques MLOps appliquées aux systèmes d'IA générative",
      "L'orchestration automatique des pipelines de données par des agents IA",
      "La gouvernance des modèles d'IA à l'échelle de l'entreprise"
    ],
    correct: 0,
    explanation: "Gartner (2017) définit AIOps comme l'application de l'intelligence artificielle aux opérations IT afin de détecter les anomalies, corréler les événements et automatiser les réponses opérationnelles."
  },
  {
    ch: 1,
    q: "Parmi les 4 problèmes du « Bon prototype ≠ Bon système », lequel est le plus directement lié à la production ?",
    choices: [
      "Données instables",
      "Processus manuels",
      "Déploiement fragile",
      "Absence de monitoring"
    ],
    correct: 3,
    explanation: "L'absence de monitoring est le problème le plus directement lié à la production : sans surveillance, on ne sait pas si le modèle dérive, si les données changent ou si les performances se dégradent."
  },
  {
    ch: 1,
    q: "Le « fossé d'industrialisation » en MLOps désigne :",
    choices: [
      "L'écart entre les performances train et test d'un modèle",
      "Le manque d'outils CI/CD dans les équipes data",
      "L'écart entre un bon prototype en notebook et un système ML robuste en production",
      "La différence de compétences entre data scientists et ingénieurs MLOps"
    ],
    correct: 2,
    explanation: "Le fossé d'industrialisation est l'écart entre un prototype fonctionnel (notebook) et un système ML robuste, scalable et maintenable en production. Combler ce fossé est l'objet principal du MLOps."
  },
  {
    ch: 1,
    q: "MLOps est la combinaison de :",
    choices: [
      "DevOps + Cloud + IA",
      "DataOps + DevOps + ML Model",
      "Agile + Lean + Machine Learning",
      "CI/CD + Monitoring + Data Engineering"
    ],
    correct: 1,
    explanation: "MLOps est la combinaison de DataOps (gestion des données), DevOps (pratiques de livraison logicielle) et ML Model (cycle de vie du modèle) pour industrialiser le machine learning."
  },
  {
    ch: 1,
    q: "LLMOps, introduit par Databricks en 2023, correspond à :",
    choices: [
      "L'application des pratiques MLOps aux grands modèles de langage (LLM)",
      "Un framework d'orchestration pour pipelines de données massifs",
      "La gouvernance des modèles open source hébergés dans le cloud",
      "L'automatisation du fine-tuning des modèles de deep learning"

// ── State ──
let selectedChapters = new Set([1, 2, 3, 4]);
let questions = [], currentIdx = 0, score = 0, answered = false;
let chapterScores = { 1:{correct:0,total:0}, 2:{correct:0,total:0}, 3:{correct:0,total:0} };
let shuffleChoices = true;
let choiceMap = [];
let sessionLog = [];

function toggleChapter(num, el) {
  if (selectedChapters.has(num)) {
    if (selectedChapters.size === 1) return; // keep at least 1
    selectedChapters.delete(num);
    el.className = 'ch-btn';
  } else {
    selectedChapters.add(num);
    el.className = `ch-btn active-ch${num}`;
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function show(id) {
  ['start-screen','quiz-screen','result-screen','history-screen'].forEach(s => {
    document.getElementById(s).classList.toggle('active', s === id);
  });
}

function startQuiz() {
  const doShuffleQ = document.getElementById('shuffle-q').checked;
  shuffleChoices    = document.getElementById('shuffle-c').checked;

  let pool = ALL_QUESTIONS.filter(q => selectedChapters.has(q.ch));
  questions = doShuffleQ ? shuffle(pool) : pool;
  currentIdx = 0; score = 0; answered = false;
  chapterScores = { 1:{correct:0,total:0}, 2:{correct:0,total:0}, 3:{correct:0,total:0}, 4:{correct:0,total:0} };
  sessionLog = [];

  show('quiz-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentIdx];
  const total = questions.length;

  document.getElementById('prog-text').textContent = `Question ${currentIdx+1} / ${total}`;
  document.getElementById('score-text').textContent = `Score : ${score}`;

  const pct = (currentIdx / total) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';

  const tag = document.getElementById('q-tag');
  tag.textContent = `CH${q.ch}`;
  tag.className = `tag tag-ch${q.ch}`;
  document.getElementById('q-num').textContent = `Q${currentIdx+1}`;
  document.getElementById('q-text').textContent = q.q;

  const letters = ['A','B','C','D'];
  const indices = shuffleChoices ? shuffle([0,1,2,3].slice(0, q.choices.length)) : [0,1,2,3].slice(0, q.choices.length);
  choiceMap = indices;

  const container = document.getElementById('choices');
  container.innerHTML = '';
  indices.forEach((origIdx, displayPos) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="letter">${letters[displayPos]}</span><span>${q.choices[origIdx]}</span>`;
    btn.onclick = () => selectAnswer(origIdx);
    container.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.style.display = 'none';
  fb.className = 'feedback-box';
  fb.textContent = '';

  document.getElementById('next-btn').style.display = 'none';
  answered = false;
}

function selectAnswer(origIdx) {
  if (answered) return;
  answered = true;

  const q = questions[currentIdx];
  const isCorrect = (origIdx === q.correct);

  sessionLog.push({ ch: q.ch, q: q.q, choices: q.choices, correct: q.correct, selected: origIdx, explanation: q.explanation });

  if (isCorrect) {
    score++;
    chapterScores[q.ch].correct++;
  }
  chapterScores[q.ch].total++;

  document.getElementById('score-text').textContent = `Score : ${score}`;

  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((btn, displayPos) => {
    btn.disabled = true;
    const thisOrig = choiceMap[displayPos];
    if (thisOrig === q.correct) {
      btn.classList.add('correct');
    } else if (thisOrig === origIdx && !isCorrect) {
      btn.classList.add('wrong');
    }
  });

  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  if (isCorrect) {
    fb.className = 'feedback-box';
    fb.innerHTML = `<strong>✓ Correct !</strong> ${q.explanation}`;
  } else {
    fb.className = 'feedback-box wrong-fb';
    fb.innerHTML = `<strong>✗ Incorrect.</strong> ${q.explanation}`;
  }

  document.getElementById('next-btn').style.display = 'inline-block';
  document.getElementById('next-btn').textContent =
    currentIdx + 1 < questions.length ? 'Question suivante →' : 'Voir les résultats';
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx < questions.length) {
    renderQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('score-fraction').textContent = `${score}/${total}`;

  let color = pct >= 80 ? '#2e7d32' : pct >= 60 ? '#f57c00' : '#c62828';
  const circle = document.getElementById('score-circle');
  circle.style.background = `conic-gradient(${color} ${pct}%, #e0e0e0 0%)`;
  document.getElementById('score-pct').style.color = color;

  let msg = '', sub = '';
  if (pct >= 80) { msg = 'Excellent ! Très bon résultat !'; sub = 'Vous maîtrisez très bien le cours.'; }
  else if (pct >= 60) { msg = 'Bien joué, continuez !'; sub = 'Quelques points à retravailler.'; }
  else { msg = 'Encore un effort !'; sub = 'Relisez les chapitres et réessayez.'; }
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-sub').textContent = sub;

  const chNames = { 1:'CH1 — Fondamentaux', 2:'CH2 — Pipelines & Orchestration', 3:'CH3 — Qualité & Tests', 4:'Certification — DataKitchen' };
  const chColors = { 1:'ch1-fill', 2:'ch2-fill', 3:'ch3-fill', 4:'ch4-fill' };
  const bd = document.getElementById('ch-breakdown');
  bd.innerHTML = '';
  [1,2,3,4].forEach(ch => {
    const s = chapterScores[ch];
    if (s.total === 0) return;
    const p = Math.round((s.correct / s.total) * 100);
    bd.innerHTML += `
      <div class="ch-score-card">
        <h4>${chNames[ch]}</h4>
        <div class="ch-score-bar"><div class="ch-score-fill ${chColors[ch]}" style="width:${p}%"></div></div>
        <div class="ch-score-num">${s.correct}/${s.total} — ${p}%</div>
      </div>`;
  });

  saveSession({ date: new Date().toLocaleString('fr-FR'), chapters: [...selectedChapters].sort(), score, total, pct, chapterScores: JSON.parse(JSON.stringify(chapterScores)), questions: sessionLog });

  show('result-screen');
}

function retryQuiz() {
  currentIdx = 0; score = 0; answered = false;
  chapterScores = { 1:{correct:0,total:0}, 2:{correct:0,total:0}, 3:{correct:0,total:0}, 4:{correct:0,total:0} };
  const doShuffleQ = document.getElementById('shuffle-q').checked;
  shuffleChoices    = document.getElementById('shuffle-c').checked;
  if (doShuffleQ) questions = shuffle(questions);
  show('quiz-screen');
  renderQuestion();
}

function backToStart() { show('start-screen'); }

// ── History ──
const HIST_KEY = 'quiz_mlops_history';

function saveSession(session) {
  let hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]');
  hist.unshift({ id: Date.now(), ...session });
  if (hist.length > 50) hist = hist.slice(0, 50);
  localStorage.setItem(HIST_KEY, JSON.stringify(hist));
}

function showHistory() {
  const hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]');
  const container = document.getElementById('history-list');
  if (hist.length === 0) {
    container.innerHTML = `
      <div class="empty-history">
        <div class="empty-icon">📋</div>
        <p style="font-size:.95rem;line-height:1.6;">Aucun quiz effectué pour le moment.<br>Complétez un quiz pour voir votre historique ici.</p>
      </div>`;
  } else {
    container.innerHTML = hist.map((s, i) => renderHistSession(s, i)).join('');
  }
  show('history-screen');
}

function renderHistSession(s, idx) {
  const color = s.pct >= 80 ? '#2e7d32' : s.pct >= 60 ? '#f57c00' : '#c62828';
  const chLabels = {1:'CH1',2:'CH2',3:'CH3',4:'Certif.'};
  const tags = (s.chapters || []).map(c => `<span class="tag tag-ch${c}">${chLabels[c]||'CH'+c}</span>`).join('');
  const letters = ['A','B','C','D'];

  const questionsHtml = (s.questions || []).map((q, qi) => {
    const isCorrect = q.selected === q.correct;
    const choicesHtml = q.choices.map((text, ci) => {
      let cls = 'neutral', icon = '';
      if (ci === q.correct) { cls = 'correct-ans'; icon = '✓'; }
      else if (ci === q.selected && !isCorrect) { cls = 'wrong-ans'; icon = '✗'; }
      return `<div class="hist-choice ${cls}"><span class="hc-letter">${icon || letters[ci]}.</span><span>${text}</span></div>`;
    }).join('');

    return `<div class="hist-q">
      <div class="hist-q-label">
        <span>${isCorrect ? '✅' : '❌'}</span>
        <span class="tag tag-ch${q.ch}" style="font-size:.65rem">${chLabels[q.ch]||'CH'+q.ch}</span>
        <span style="font-size:.75rem;color:var(--muted)">Q${qi+1}</span>
      </div>
      <div class="hist-q-text">${q.q}</div>
      ${choicesHtml}
      <div class="hist-expl">${q.explanation}</div>
    </div>`;
  }).join('');

  const wrong = (s.questions||[]).filter(q => q.selected !== q.correct).length;
  const wrongBadge = wrong > 0 ? `<span style="font-size:.75rem;color:var(--error);margin-left:6px;">${wrong} erreur${wrong>1?'s':''}</span>` : '';

  return `<div class="hist-item">
    <div class="hist-header" onclick="toggleHistDetail(${idx})">
      <div class="hist-score-mini" style="background:conic-gradient(${color} ${s.pct}%,#e0e0e0 0%)">
        <div class="hist-score-inner" style="color:${color}">${s.pct}%</div>
      </div>
      <div class="hist-info">
        <div class="hist-date">${s.date}</div>
        <div class="hist-score-line">${s.score}/${s.total} correct${wrongBadge}</div>
        <div class="hist-tags">${tags}</div>
      </div>
      <span class="hist-chevron" id="chev-${idx}">▼</span>
    </div>
    <div class="hist-detail" id="detail-${idx}">
      ${questionsHtml}
    </div>
  </div>`;
}

function toggleHistDetail(idx) {
  document.getElementById(`detail-${idx}`).classList.toggle('open');
  document.getElementById(`chev-${idx}`).classList.toggle('open');
}

function clearHistory() {
  if (!confirm('Supprimer tout l\'historique ?')) return;
  localStorage.removeItem(HIST_KEY);
  showHistory();
}
